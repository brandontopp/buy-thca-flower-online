<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Flower Tier</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #FAFAF7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.widget {
  width: 100%;
  max-width: 620px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 36px 36px;
  box-shadow: 0 4px 32px rgba(27,58,47,0.10);
  position: relative;
  overflow: hidden;
}

/* subtle top bar */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: #1B3A2F;
  border-radius: 20px 20px 0 0;
}

/* INTRO */
.intro { text-align: center; }

.intro .eyebrow {
  display: inline-block;
  background: #EEF3F0;
  color: #1B3A2F;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 100px;
  margin-bottom: 18px;
}

.intro h2 {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 800;
  color: #1B3A2F;
  line-height: 1.2;
  margin-bottom: 10px;
}

.intro p {
  font-size: 15px;
  color: #5a6b65;
  margin-bottom: 28px;
  line-height: 1.6;
}

.btn-start {
  display: inline-block;
  background: #1B3A2F;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 36px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.01em;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(27,58,47,0.25); }
.btn-start:active { transform: translateY(0); }

/* QUIZ */
.quiz { display: none; }

.progress-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.progress-pip {
  flex: 1;
  height: 4px;
  border-radius: 100px;
  background: #E5EDE9;
  transition: background 0.3s;
}
.progress-pip.active { background: #1B3A2F; }

.question-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8aaa9a;
  margin-bottom: 10px;
}

.question-text {
  font-size: clamp(18px, 4vw, 24px);
  font-weight: 800;
  color: #1B3A2F;
  line-height: 1.3;
  margin-bottom: 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 20px;
  border: 2px solid #E5EDE9;
  border-radius: 14px;
  background: #fff;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  font-size: 15px;
  color: #1B3A2F;
  font-weight: 500;
}
.option-btn:hover {
  border-color: #1B3A2F;
  background: #F4F8F5;
  transform: translateX(4px);
}
.option-btn .emoji {
  font-size: 22px;
  flex-shrink: 0;
  width: 32px;
  text-align: center;
}
.option-btn .label { flex: 1; line-height: 1.3; }
.option-btn .sublabel {
  font-size: 12px;
  color: #8aaa9a;
  font-weight: 400;
  display: block;
  margin-top: 2px;
}

/* RESULT */
.result { display: none; text-align: center; }

.result-badge {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 18px;
}

.result-tier {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.result-name {
  font-size: clamp(24px, 6vw, 34px);
  font-weight: 800;
  color: #1B3A2F;
  margin-bottom: 14px;
  line-height: 1.2;
}

.result-desc {
  font-size: 15px;
  color: #5a6b65;
  line-height: 1.65;
  margin-bottom: 28px;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

.result-pills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
}

.pill {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 100px;
}

.btn-shop {
  display: inline-block;
  background: #1B3A2F;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 36px;
  border-radius: 100px;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.01em;
  margin-bottom: 14px;
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 14px;
}
.btn-shop:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(27,58,47,0.25); }

.btn-retake {
  background: none;
  border: none;
  color: #8aaa9a;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  margin-top: 10px;
  display: block;
  width: 100%;
  text-align: center;
}
.btn-retake:hover { color: #1B3A2F; }

/* transitions */
.fade-in {
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 420px) {
  .card { padding: 28px 20px 24px; }
}
</style>
</head>
<body>

<div class="widget">
  <div class="card">

    <!-- INTRO -->
    <div class="intro" id="intro">
      <span class="eyebrow">✦ 3 quick questions</span>
      <h2>Which THCa Flower Tier Is Right for You?</h2>
      <p>Answer three questions and we'll match you to the right tier — Economy, Premium, or Top Shelf.</p>
      <button class="btn-start" onclick="startQuiz()">Find My Tier &rarr;</button>
    </div>

    <!-- QUIZ -->
    <div class="quiz" id="quiz">
      <div class="progress-bar" id="progressBar">
        <div class="progress-pip" id="pip0"></div>
        <div class="progress-pip" id="pip1"></div>
        <div class="progress-pip" id="pip2"></div>
      </div>
      <div class="question-label" id="questionLabel">Question 1 of 3</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <!-- RESULT -->
    <div class="result" id="result">
      <div class="result-badge" id="resultBadge"></div>
      <div class="result-tier" id="resultTier"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-pills" id="resultPills"></div>
      <a class="btn-shop" id="resultCTA" href="#" target="_top">Shop This Tier &rarr;</a>
      <button class="btn-retake" onclick="reset()">Start over</button>
    </div>

  </div>
</div>

<script>
const questions = [
  {
    text: "What's your typical budget per ounce?",
    options: [
      { emoji: '💚', label: 'Under $90',         sub: 'Value is the priority',          value: 0 },
      { emoji: '✨', label: '$90 – $160',         sub: 'Quality worth paying for',        value: 1 },
      { emoji: '🏆', label: '$160+',              sub: 'Only the best will do',           value: 2 },
    ]
  },
  {
    text: 'How often do you smoke?',
    options: [
      { emoji: '🌿', label: 'Daily or near-daily', sub: 'I go through flower pretty fast', value: 0 },
      { emoji: '🌙', label: 'A few times a week',  sub: 'Regular but not constant',        value: 1 },
      { emoji: '🎉', label: 'Special occasions',   sub: 'I want it to feel like a treat',  value: 2 },
    ]
  },
  {
    text: 'What matters most when you pick a strain?',
    options: [
      { emoji: '💰', label: 'Price per gram',          sub: 'Stretch my budget as far as it goes', value: 0 },
      { emoji: '⚖️', label: 'Quality-to-price balance', sub: 'Great flower without overpaying',    value: 1 },
      { emoji: '🌸', label: 'Terpenes and bag appeal',  sub: 'I want the full craft experience',   value: 2 },
    ]
  }
];

const tiers = [
  {
    min: 0, max: 2,
    badge: '🌿', badgeBg: '#EEF3F0', badgeColor: '#1B3A2F',
    tier: 'Your Match',
    name: 'Economy Tier',
    desc: 'Outdoor and large-greenhouse flower at honest prices. Solid THCa percentages, consistent effects, and bulk-friendly pricing — the right call when quality-per-dollar matters more than bag appeal.',
    pills: [
      { label: 'Outdoor & Greenhouse', bg: '#EEF3F0', color: '#1B3A2F' },
      { label: 'Budget-Friendly',      bg: '#EEF3F0', color: '#1B3A2F' },
      { label: 'Everyday Smoke',       bg: '#EEF3F0', color: '#1B3A2F' },
    ],
    url: 'https://mood.com/shop/product-category/flower/economy',
    cta: 'Shop Economy Tier →'
  },
  {
    min: 3, max: 5,
    badge: '✨', badgeBg: '#F0EEF8', badgeColor: '#5a4a8a',
    tier: 'Your Match',
    name: 'Premium Tier',
    desc: 'Smaller-scale greenhouse flower with dialed-in terpene profiles and strong bag appeal. This is where most buyers land — a step up in aroma and density without the Top Shelf price tag.',
    pills: [
      { label: 'Greenhouse Grown',    bg: '#F0EEF8', color: '#5a4a8a' },
      { label: 'Rich Terpenes',       bg: '#F0EEF8', color: '#5a4a8a' },
      { label: 'Best-Seller Tier',    bg: '#F0EEF8', color: '#5a4a8a' },
    ],
    url: 'https://mood.com/shop/product-category/flower/premium',
    cta: 'Shop Premium Tier →'
  },
  {
    min: 6, max: 9,
    badge: '🏆', badgeBg: '#FDF4E7', badgeColor: '#8a5a1a',
    tier: 'Your Match',
    name: 'Top Shelf Tier',
    desc: 'Ultra-boutique greenhouse and indoor flower. Dense trichome coverage, complex terpene expression, and the kind of bag appeal that earns strain-level reviews in the thousands. When only the best will do.',
    pills: [
      { label: 'Indoor & Boutique',    bg: '#FDF4E7', color: '#8a5a1a' },
      { label: 'Craft Quality',        bg: '#FDF4E7', color: '#8a5a1a' },
      { label: 'Special Occasion',     bg: '#FDF4E7', color: '#8a5a1a' },
    ],
    url: 'https://mood.com/shop/product-category/flower/top-shelf',
    cta: 'Shop Top Shelf →'
  }
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  const quiz = document.getElementById('quiz');
  quiz.style.display = 'block';
  quiz.classList.add('fade-in');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];

  // Progress pips
  for (let i = 0; i < 3; i++) {
    document.getElementById('pip' + i).classList.toggle('active', i <= current);
  }

  document.getElementById('questionLabel').textContent = 'Question ' + (current + 1) + ' of 3';

  const qText = document.getElementById('questionText');
  qText.textContent = q.text;
  qText.classList.remove('fade-in');
  void qText.offsetWidth;
  qText.classList.add('fade-in');

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  container.classList.remove('fade-in');
  void container.offsetWidth;
  container.classList.add('fade-in');

  q.options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML =
      '<span class="emoji">' + opt.emoji + '</span>' +
      '<span class="label">' + opt.label +
        (opt.sub ? '<span class="sublabel">' + opt.sub + '</span>' : '') +
      '</span>';
    btn.addEventListener('click', function() { pick(opt.value); });
    container.appendChild(btn);
  });
}

function pick(value) {
  score += value;
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.classList.add('fade-in');

  const tier = score <= 2 ? tiers[0] : score <= 5 ? tiers[1] : tiers[2];

  const badge = document.getElementById('resultBadge');
  badge.textContent = tier.badge;
  badge.style.background = tier.badgeBg;

  document.getElementById('resultTier').textContent = tier.tier;
  document.getElementById('resultTier').style.color = tier.badgeColor;
  document.getElementById('resultName').textContent = tier.name;
  document.getElementById('resultDesc').textContent = tier.desc;

  const pillsEl = document.getElementById('resultPills');
  pillsEl.innerHTML = '';
  tier.pills.forEach(function(p) {
    const span = document.createElement('span');
    span.className = 'pill';
    span.textContent = p.label;
    span.style.background = p.bg;
    span.style.color = p.color;
    pillsEl.appendChild(span);
  });

  const cta = document.getElementById('resultCTA');
  cta.href = tier.url;
  cta.textContent = tier.cta;
}

function reset() {
  current = 0;
  score = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
  document.getElementById('intro').classList.add('fade-in');
}
</script>

</body>
</html>
